<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Grocery Genie — From receipts to a kitchen that thinks ahead">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#E6E2D8"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="rgba(21,20,15,0.10)"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- wordmark -->
  <text x="80" y="120"
        font-family="'Instrument Serif', Georgia, serif"
        font-size="34"
        fill="#15140F">Grocery <tspan font-style="italic" fill="#5A554A">Genie</tspan></text>

  <!-- pill -->
  <g transform="translate(80,160)">
    <rect width="280" height="32" rx="16" fill="#E6E2D8"/>
    <circle cx="22" cy="16" r="4" fill="#1F7A4A"/>
    <text x="38" y="21" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" letter-spacing="2" fill="#5A554A">COMING Q3 2026 · WAITLIST OPEN</text>
  </g>

  <!-- headline -->
  <text x="80" y="290"
        font-family="'Instrument Serif', Georgia, serif"
        font-size="80"
        fill="#15140F">From <tspan font-style="italic" fill="#5A554A">receipts</tspan> to a kitchen</text>
  <text x="80" y="376"
        font-family="'Instrument Serif', Georgia, serif"
        font-size="80"
        fill="#15140F">that <tspan font-style="italic" fill="#5A554A">thinks ahead.</tspan></text>

  <!-- subhead -->
  <text x="80" y="438"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22"
        fill="#5A554A">A smart pantry that starts with a receipt.</text>

  <!-- mock phone tile -->
  <g transform="translate(820,150)">
    <rect width="280" height="380" rx="36" fill="#1C1C1E"/>
    <rect x="6" y="6" width="268" height="368" rx="32" fill="#F2F2F7"/>
    <!-- status bar -->
    <text x="34" y="38" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#000">9:41</text>
    <rect x="100" y="14" width="78" height="22" rx="11" fill="#000"/>

    <!-- olive oil price card -->
    <text x="30" y="80" font-family="-apple-system, sans-serif" font-size="13" fill="#3C3C43">Olive oil · 1L</text>
    <text x="30" y="118" font-family="-apple-system, sans-serif" font-weight="700" font-size="32" fill="#000">$15.32</text>
    <text x="30" y="142" font-family="-apple-system, sans-serif" font-size="12" fill="#FF3B30">↑ 43% in 12 months</text>

    <!-- chart card -->
    <rect x="20" y="160" width="240" height="100" rx="14" fill="#FFFFFF"/>
    <polyline points="36,238 60,238 84,222 108,222 132,210 156,194 180,194 204,182 228,168 252,156"
              fill="none" stroke="#1F7A4A" stroke-width="2.5"/>
    <circle cx="252" cy="156" r="4" fill="#1F7A4A"/>

    <!-- store list -->
    <rect x="20" y="276" width="240" height="76" rx="14" fill="#FFFFFF"/>
    <text x="36" y="298" font-family="-apple-system, sans-serif" font-size="12" fill="#3C3C43">Trader Joe's</text>
    <text x="244" y="298" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1F7A4A" text-anchor="end">$13.99</text>
    <text x="36" y="318" font-family="-apple-system, sans-serif" font-size="12" fill="#3C3C43">Whole Foods</text>
    <text x="244" y="318" font-family="-apple-system, sans-serif" font-size="12" fill="#3C3C43" text-anchor="end">$15.99</text>
    <text x="36" y="338" font-family="-apple-system, sans-serif" font-size="12" fill="#3C3C43">Safeway</text>
    <text x="244" y="338" font-family="-apple-system, sans-serif" font-size="12" fill="#3C3C43" text-anchor="end">$16.49</text>
  </g>

  <!-- footer URL -->
  <text x="80" y="570"
        font-family="-apple-system, sans-serif"
        font-size="18"
        letter-spacing="3"
        fill="#8C8678">GROCERYGENIE.APP</text>
</svg>
