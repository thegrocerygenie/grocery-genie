<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Grocery Genie · MVP Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens-v2.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components-v2/primitives.jsx"></script>
<script type="text/babel" src="components-v2/patterns.jsx"></script>
<script type="text/babel" src="components-v2/phone-shell.jsx"></script>
<script type="text/babel" src="components-v2/mvp-screens.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const M = window.MVPScreens;
  return (
    <DesignCanvas>
      <DCSection id="onboarding" title="Onboarding" subtitle="First launch — set a budget, ask for camera">
        <DCArtboard id="onb" label="Welcome · Budget · Camera permission" width={1100} height={720}>
          <div style={{ padding: 32, height: '100%', boxSizing: 'border-box' }}><M.SectionOnboarding /></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="dashboard" title="Dashboard" subtitle="Empty · on-track · over-budget">
        <DCArtboard id="dash" label="Three states of the budget tab" width={1100} height={720}>
          <div style={{ padding: 32, height: '100%', boxSizing: 'border-box' }}><M.SectionDashboard /></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="scan" title="Scan flow" subtitle="VisionKit-style capture — detect, process, error, denied">
        <DCArtboard id="scan" label="Capture · processing · low-quality · permission denied" width={1450} height={720}>
          <div style={{ padding: 32, height: '100%', boxSizing: 'border-box' }}><M.SectionScan /></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="review" title="Review" subtitle="Inset-grouped form — edit before save">
        <DCArtboard id="review" label="Review · edit field" width={760} height={720}>
          <div style={{ padding: 32, height: '100%', boxSizing: 'border-box' }}><M.SectionReview /></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="history" title="History" subtitle="Wallet-style row list with search & segmented filter">
        <DCArtboard id="history" label="History · empty" width={760} height={720}>
          <div style={{ padding: 32, height: '100%', boxSizing: 'border-box' }}><M.SectionHistory /></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="settings" title="Settings" subtitle="Budget limits & alert thresholds">
        <DCArtboard id="settings" label="Budget · Notifications" width={760} height={720}>
          <div style={{ padding: 32, height: '100%', boxSizing: 'border-box' }}><M.SectionSettings /></div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
