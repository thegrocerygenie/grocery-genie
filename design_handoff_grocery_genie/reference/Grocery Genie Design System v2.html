<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Grocery Genie · Design System v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens-v2.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components-v2/primitives.jsx"></script>
<script type="text/babel" src="components-v2/foundations.jsx"></script>
<script type="text/babel" src="components-v2/components.jsx"></script>
<script type="text/babel" src="components-v2/patterns.jsx"></script>
<script type="text/babel" src="components-v2/motion.jsx"></script>
<script type="text/babel" src="components-v2/screens.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="philosophy" title="Philosophy" subtitle="Defer to the system. Make capture-to-budget instant.">
        <DCArtboard id="foundations" label="Foundations · SF · system color · materials" width={1000} height={1100}>
          <window.FoundationsV2 />
        </DCArtboard>
      </DCSection>

      <DCSection id="building-blocks" title="Building blocks" subtitle="Stock iOS — buttons, lists, tab bar">
        <DCArtboard id="components" label="Components · roles, lists, segmented" width={1000} height={760}>
          <window.ComponentsV2 />
        </DCArtboard>
      </DCSection>

      <DCSection id="domain" title="Domain patterns" subtitle="Activity ring · Wallet rows · Live Activity · widgets">
        <DCArtboard id="patterns" label="Budget ring · Dynamic Island · widgets" width={1100} height={1280}>
          <window.PatternsV2 />
        </DCArtboard>
        <DCArtboard id="motion" label="Motion · haptics · accessibility" width={1000} height={920}>
          <window.MotionV2 />
        </DCArtboard>
      </DCSection>

      <DCSection id="screens" title="In context" subtitle="System applied to real screens">
        <DCArtboard id="screens" label="Dashboard · Scan · Review" width={1040} height={720}>
          <window.ScreensV2 />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
